services:
  # FastAPI Backend
  - type: web
    name: fashion-rag-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: HF_EMBEDDING_MODEL
        value: sentence-transformers/distiluse-base-multilingual-cased
      - key: HF_IMAGE_MODEL
        value: openai/clip-vit-base-patch32
      - key: USE_LOCAL_EMBEDDINGS
        value: "True"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  # Streamlit UI
  - type: web
    name: fashion-rag-ui
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BACKEND_URL
        fromService:
          type: web
          name: fashion-rag-api
          envVarKey: RENDER_EXTERNAL_URL
